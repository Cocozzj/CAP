gs_param:
  gs_dimension: 59
encoder:
  object_encoder:
    visibility_threshold: 0.2
    backbone_type: resnet34
    freeze_backbone: true
    resnet34_param:
      pretrained: true
      out_index: 3
      normalize: true
      chunk: 128
      center_crop_to_patch: true
      patch_size: 16
    vit_param:
      variant: base
      pretrained: true
      proj_dim: 512
      chunk: 128
      normalize: true
      center_crop_to_patch: true
      patch_size: 16
    videomae_param:
      variant: base
      tubelet_size: 1
      proj_dim: 512
      chunk: 16
      normalize: true
      center_crop_to_patch: true
      patch_size: 16
    slotatt_param:
      slot_dim: 128
      num_slots: 6
      num_iters: 3
      hidden_dim: 256
      max_views: 8
      gs_hidden_dim: 128
  motion_encoder:
    in_dim: 128
    motion_dim: 128
    window_size: 5
    channels:
    - 128
    - 128
    - 128
    - 128
    kernel_size: 3
    dropout: 0.1
    causal: false
    film_hidden: 64
  action_tokenizer:
    in_dim: 128
    num_action_codebook: 512
    token_dim: 57
    beta: 0.25
    vq_restart_interval: 1000
    vq_restart_threshold: 0.1
    translation:
      dim: 16
      delta_step: 0.05
      max_steps: 5
    rotation:
      dim: 16
      group: cube24
    micro_rotation:
      dim: 16
      max_angle: 5
    deformation:
      enabled: true
      dim: 9
      components:
      - youngs
      - poisson
      - density
      - force_x
      - force_y
      - force_z
      - friction
      - damping
      - dt
planner:
  task_dim: 64
  use_task_token: true
  specials:
    pad_id: -1
  language_encoder_cfg:
    model_type: sentencetransformer
    proj_cfg:
      proj_type: mlp
      hidden: 512
      act: gelu
      normalize: false
  task_tokenizer_cfg:
    atomic_dim: 57
    d_model: 256
    num_task_tokens: 128
    max_seq_len: 512
    n_layers: 4
    n_heads: 8
    ff_dim: 1024
    dropout: 0.1
    vq_beta: 0.25
    task_restart_interval: 1000
    task_restart_threshold: 2
  cvae_cfg:
    d_model: 256
    z_dim: 32
  sampling_cfg:
    strategy: top_k
    top_k: 50
    temperature: 0.8
    max_len: 30
    min_len: 6
    num_samples: 1
    deterministic: true
executor:
  max_delta_mu: 1.0
  residual:
    enabled: true
    hidden_scalar: 16
    hidden_vector: 4
  physics:
    pbd:
      n_iterations: 5
      n_substeps: 2
    rigid_contact:
      gravity: -9.81
      ground_height: 0.0
  materials:
    wood:
      elastic_modulus: 10000000000.0
      poisson_ratio: 0.35
      density: 600.0
      friction_coeff: 0.4
      restitution: 0.3
    metal:
      elastic_modulus: 200000000000.0
      poisson_ratio: 0.3
      density: 7800.0
      friction_coeff: 0.3
      restitution: 0.5
    foam:
      elastic_modulus: 100000.0
      poisson_ratio: 0.3
      density: 30.0
      friction_coeff: 0.6
      restitution: 0.1
    rubber:
      elastic_modulus: 10000000.0
      poisson_ratio: 0.48
      density: 1100.0
      friction_coeff: 0.8
      restitution: 0.7
    default:
      elastic_modulus: 10000.0
      poisson_ratio: 0.3
      density: 1000.0
      friction_coeff: 0.5
      restitution: 0.5
  dispatch:
    temperature: 1.0
    hard: false
