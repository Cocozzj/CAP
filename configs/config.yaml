gs_param:
  # Only ``gs_dimension`` is consumed by CAPModel — sh_degree / max_points /
  # init_sigma / init_opacity were never read; they previously lived here as
  # documentation but caused config drift.  Removed so the only key visible
  # is the one that actually affects the model.
  gs_dimension: 59        # mu[3] + scale[3] + cov[4] + opacity[1] + sh[(3+1)^2*3=48] = 59

# ================================================================
# Encoder (perception → motion → discrete tokens)
# ================================================================
encoder:
  object_encoder:
    visibility_threshold: 0.2
    backbone_type: resnet34
    freeze_backbone: true
    resnet34_param:
      pretrained: true
      out_index: 3
      normalize: true
      chunk: 128
      center_crop_to_patch: true
      patch_size: 16
      
    vit_param:
      variant: base       #small|base
      pretrained: true
      proj_dim: 512
      chunk: 128
      normalize: true
      center_crop_to_patch: true
      patch_size: 16
      
    videomae_param:
      variant: base       #tiny|small|base|large#
      tubelet_size: 1
      proj_dim: 512
      chunk: 16
      normalize: true
      center_crop_to_patch: true
      patch_size: 16

    slotatt_param:
      slot_dim: &slot_dim 128
      num_slots: 6
      num_iters: 3
      hidden_dim: 256
      max_views: 8
      gs_hidden_dim: 128
      
  motion_encoder:
    in_dim: *slot_dim
    motion_dim: &motion_dim 128
    window_size: 5
    channels: [128, 128, 128, 128]
    kernel_size: 3
    dropout: 0.1
    causal: false         # true for autoregressive planner later
    film_hidden: 64

  action_tokenizer:
    in_dim: *motion_dim
    num_action_codebook: 512            # K = 512, size of action codebook
    token_dim: &atomic_dim 64             # = d_l + d_h + d_xi + d_rho = 16×4 
    beta: 0.25
    vq_restart_interval: 1000      
    vq_restart_threshold: 0.1 

    translation:
      dim: 16
      delta_step: 0.05        # Translation step size: 5 cm (canonical space)
      max_steps: 5

    rotation:
      dim: 16                 # cube24, 15° per axis, 24 orientations
      group: cube24

    micro_rotation:
      dim: 16
      max_angle: 5           # r≈5°

    deformation:
      enabled: true
      dim: 16
      n_params: 4
      components: [elasticity, density, force, friction]

# ================================================================
# Planner (Task Tokenization + CVAE + AR Decoder) — API params
# ================================================================
planner:
  task_dim: 64
  # Ablation (PDF main proposal §5.2): set false to bypass TaskTokenizer entirely
  # — text → LanguageEncoder → text_emb directly conditions CVAE / AR decoder.
  # When false, training requires text_labels in the batch.
  use_task_token: true
  specials:
    pad_id: -1                        # padding ID (never embedded)
  language_encoder_cfg:
    model_type: sentencetransformer             # "clip" | "sentencetransformer"
    proj_cfg:
      proj_type: mlp
      hidden: 512
      act: gelu
      normalize: false

  task_tokenizer_cfg:
    atomic_dim: *atomic_dim
    d_model: 256
    num_task_tokens: 128                    # J = 128 , size of task codebook
    max_seq_len: 512                       # ceil(251/5)*6=306 with window=5; pad to 512 (next pow-2)
    n_layers: 4
    n_heads: 8
    ff_dim: 1024
    dropout: 0.1
    vq_beta: 0.25
    task_restart_interval: 1000
    task_restart_threshold: 2

  cvae_cfg:
    d_model: 256
    z_dim: 32

  sampling_cfg:
    strategy: top_k
    top_k: 50
    temperature: 0.8
    max_len: 30
    min_len: 6            # >= num_slots (K=6) to guarantee at least T=1 timestep
    num_samples: 1
    deterministic: true

# ================================================================
# Executor: SE(3) rigid + optional physics plugin
# ================================================================
executor:
  max_delta_mu: 1.0
  residual:
    enabled: true
    hidden_scalar: 16           # TFN scalar channel width  → tfn_scalar_dim
    hidden_vector: 4            # TFN vector channel width  → tfn_vector_dim
  physics:
    # NOTE: ``enabled: true/false`` is NOT read here — physics on/off is gated
    # entirely per-stage by ``StageSpec.enable_physics`` in train/stages.py.
    # Only the sub-keys below (pbd, rigid_contact, enabled_backends) reach the model.
    # Ablation (PDF main proposal §5.2): subset of backends to instantiate.
    # Default = all 3.  Examples:
    #   enabled_backends: [pbd]               # PBD-only
    #   enabled_backends: [pbd, mpm]          # soft-only
    #   enabled_backends: [rigid_contact]     # rigid-only
    # enabled_backends: [rigid_contact, pbd, mpm]
    pbd:
      n_iterations: 5           # → RhoParser.n_iters  (PDF main proposal hyperparam table)
      n_substeps:   2           # → RhoParser.n_substeps  (Verlet sub-steps)
    rigid_contact:
      gravity: -9.81
      ground_height: 0.0

  materials:
    wood:
      elastic_modulus: 1.0e+10
      poisson_ratio: 0.35
      density: 600.0
      friction_coeff: 0.4
      restitution: 0.3

    metal:
      elastic_modulus: 2.0e+11
      poisson_ratio: 0.30
      density: 7800.0
      friction_coeff: 0.3
      restitution: 0.5

    foam:
      elastic_modulus: 1.0e+5
      poisson_ratio: 0.30
      density: 30.0
      friction_coeff: 0.6
      restitution: 0.1

    rubber:
      elastic_modulus: 1.0e+7
      poisson_ratio: 0.48
      density: 1100.0
      friction_coeff: 0.8
      restitution: 0.7

    default:
      elastic_modulus: 1.0e+4
      poisson_ratio: 0.30
      density: 1000.0
      friction_coeff: 0.5
      restitution: 0.5

  dispatch:
    temperature: 1.0            # Gumbel-softmax routing temperature
    hard: false                 # true = exclusive winner (straight-through)


