atomic_seq_len: 12
rho_dim: 8
actions:
  open:
    id: 1
    inverse: close
    family: hinge
    ranges:
      angle_deg: [30.0, 90.0]
      speed: [0.5, 2.0]
  close:
    id: 2
    inverse: open
    family: hinge
    ranges:
      angle_deg: [-90.0, -30.0]
      speed: [0.5, 2.0]
  push:
    id: 3
    inverse: pull
    family: translation
    ranges:
      distance_m: [0.05, 0.30]
      force_n: [2.0, 20.0]
  pull:
    id: 4
    inverse: push
    family: translation
    ranges:
      distance_m: [-0.30, -0.05]
      force_n: [2.0, 20.0]
  rotate:
    id: 5
    inverse: rotate
    family: axial
    ranges:
      angle_deg: [15.0, 180.0]
      speed: [0.5, 3.0]
  lift:
    id: 6
    inverse: place
    family: vertical_translation
    ranges:
      height_m: [0.05, 0.35]
      speed: [0.5, 2.0]
  place:
    id: 7
    inverse: lift
    family: vertical_translation
    ranges:
      height_m: [-0.35, -0.05]
      speed: [0.5, 2.0]
  press:
    id: 8
    inverse: release
    family: contact_deform
    ranges:
      depth_m: [0.005, 0.08]
      force_n: [1.0, 50.0]
  squeeze:
    id: 9
    inverse: release
    family: deform
    ranges:
      strain: [0.05, 0.35]
      force_n: [5.0, 80.0]
  release:
    id: 10
    inverse: press
    family: relax
    ranges:
      duration_s: [0.25, 1.0]
