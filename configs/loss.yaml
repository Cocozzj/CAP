# ================================================================
# Loss weights & hyper-parameters
# ================================================================
loss:
  # A. Algebraic structure
  lambda_clos:            0.5       # PDF
  lambda_inv:             0.5       # PDF
  lambda_eq:              0.5       # PDF (was 0.3 — equivariance is core contribution)
  lambda_eq_cross:        0.5       # match lambda_eq (PDF unspecified)
  lambda_comm:            0.01      # base; ramped 0.01→0.1 in Stage-2 (engineering)
  lambda_comm_max:        0.1       # anneal endpoint for L_comm
  # B. Reconstruction
  lambda_rec:             0.2       # PDF (was 1.0 — was dominating)
  lambda_rec_mse:         0.2
  lambda_rec_lpips:       0.1       # PDF (lambda_lpips = 0.1)
  lambda_depth:           0.5
  # C. Semantic alignment
  # NCE was 0.1 → planner mode collapse: task_codebook all 128 entries
  # collapsed to cosine sim 0.99+, all texts mapped to same task_id.  Bumped
  # to 1.0 for the planner-stage fine-tune that recovers from that collapse.
  # See fix_planner_finetune.py.
  lambda_nce:             1.0       # was 0.1 (PDF: 0.3)
  nce_temperature:        0.07
  # NCE applied on PRE-VQ text_emb / h_task as well as POST-VQ task_emb so the
  # diversity signal reaches lang.proj_head and task_tok directly even when
  # quantization collapses.  Same temperature.
  lambda_nce_preVQ:       1.0       # NEW
  # D. Quantization & planning
  # lambda_vq_task reduced 1.0 → 0.3 to avoid the "VQ commitment crushes
  # everything to one entry" failure mode that caused codebook collapse.
  lambda_vq_act:          1.0       # standard VQ commitment (PDF unspecified)
  lambda_vq_task:         0.3       # was 1.0; relaxed to permit codebook diversity
  lambda_cvae_kl:         0.01      # base; β anneal 0.01→0.1 in Stage-2 (PDF: fixed β=0.1)
  lambda_cvae_kl_max:     0.1       # anneal endpoint = PDF's β value
  lambda_cvae_recon:      1.0
  lambda_planner_ce:      1.0       # AR cross-entropy
  lambda_hier:            0.2       # hierarchical consistency (PDF unspecified)
  # E. Regularization
  lambda_lip:             0.01    # was 0.1; reduced 10× because L_Lip blew up
                                  # to ~242 in PHYSICS first step (target_C=2),
                                  # gradient explosion through vfield's spectral_norm
                                  # → NaN params.  Re-raise once vfield stable.
  lip_target_C:           2.0
  lip_epsilon:            0.01
  lambda_entropy:         0.30      # was 0.05; 6× to keep codebook spread out
  entropy_H_min:          3.0
  entropy_H_max:          8.0
  lambda_physics:         0.1       # PDF (was 0.5)
  lambda_physics_vol:     0.5
  lambda_physics_contact: 1.0
  lambda_physics_energy:  1.0
  physics_contact_d_min:  0.01


# ================================================================
# Training: optimizer, scheduler, 3-stage curriculum
# ================================================================
training:
  # ONLY ``tau_schedule`` is consumed by trainer.py (see _compute_tau in train/trainer.py).
  # All per-stage hyperparameters (lr, epochs, sample_prob ramp, render_n_timesteps,
  # loss flags) live in train/stages.py.  Other process-level knobs (seed,
  # max_epochs, optimizer.*, scheduler.*, grad_clip, save_every, output_dir)
  # come from trainer.py CLI flags.  Don't add dead config keys here.

  # Gumbel-softmax temperature annealing for slot attention.
  # Linearly anneals tau from start → end over (anneal_epochs * steps_per_epoch)
  # using the cumulative global_step (NOT per-stage step).
  tau_schedule:
    start: 1.0
    end: 0.1
    anneal_epochs: 30
